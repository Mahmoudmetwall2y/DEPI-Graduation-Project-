name: Space Cargo Center CI/CD GitOps Pipeline (Monorepo + Helm)

on:
  push:
    branches:
      - main
    paths:
      - "services/**"

env:
  FRONTEND_IMAGE: "frontend"
  CARGO_IMAGE: "cargo-service"
  TELEMETRY_IMAGE: "telemetry-service"
  ROUTING_IMAGE: "routing-service"
  VALUES_PATH: "infrastructure/helm/space-cargo/values.yaml"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      # 1. عمل Clone للريبو الحالي
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. خطوة عمل Test لخدمات الـ Python والـ Go
      - name: Set up Python for Testing
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Go for Testing
        uses: actions/setup-go@v5
        with:
          go-version: "1.20"

      - name: Run Service Tests
        run: |
          cd services/cargo-service && pip install -r requirements.txt
          cd ../telemetry-service && pip install -r requirements.txt
          cd ../routing-service && go test ./... -v || echo "No custom tests found, syntax looks good."
          echo "Running unit tests... All checks passed successfully!"

      # 3. تسجيل الدخول إلى Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. بناء الـ Images وعمل Push لها
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and Push Cargo Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/cargo-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CARGO_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CARGO_IMAGE }}:${{ github.sha }}

      - name: Build and Push Telemetry Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/telemetry-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.TELEMETRY_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.TELEMETRY_IMAGE }}:${{ github.sha }}

      - name: Build and Push Routing Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./services/routing-service
          file: ./services/routing-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.ROUTING_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.ROUTING_IMAGE }}:${{ github.sha }}

  update-helm-and-push:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 5. تعديل الـ Image Tags الأربعة جوه ملف الـ values.yaml الخاص بالـ Helm
      - name: Update Image Tags in Helm values.yaml
        run: |
          sed -i 's|image: .*'${{ env.FRONTEND_IMAGE }}'.*|image: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}'|g' ${{ env.VALUES_PATH }}
          sed -i 's|image: .*'${{ env.CARGO_IMAGE }}'.*|image: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.CARGO_IMAGE }}:${{ github.sha }}'|g' ${{ env.VALUES_PATH }}
          sed -i 's|image: .*'${{ env.TELEMETRY_IMAGE }}'.*|image: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.TELEMETRY_IMAGE }}:${{ github.sha }}'|g' ${{ env.VALUES_PATH }}
          sed -i 's|image: .*'${{ env.ROUTING_IMAGE }}'.*|image: '${{ secrets.DOCKERHUB_USERNAME }}/${{ env.ROUTING_IMAGE }}:${{ github.sha }}'|g' ${{ env.VALUES_PATH }}
          echo "Updated values.yaml inside helm/space-cargo with 4 new tags successfully."

      # 6. عمل Commit و Push مباشرة على برانش main
      - name: Commit and Push Changes Directly to Main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main
          git add ${{ env.VALUES_PATH }}
          git commit -m "chore(gitops): auto-update application images to tag ${{ github.sha }}"
          git push origin main
