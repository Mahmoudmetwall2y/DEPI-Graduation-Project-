- name: EKS and EventBridge Deployment via Shell
  hosts: localhost
  connection: local
  vars:
    cluster_name: "EKS-Cluster"
    region: "us-west-2"
    account_id: "408670322614"
    sns_topic_name: "MyTopic"
    user_email: "mahmouddiab6600@gmail.com"

    #-------------------------------------------
    deployment_content: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: my-app
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: my-app
        template:
          metadata:
            labels:
              app: my-app
          spec:
            containers:
              - name: my-app-container
                image: nginx:latest
                ports:
                  - containerPort: 80
    service_content: |
      apiVersion: v1
      kind: Service
      metadata:
        name: my-app-service
      spec:
        selector:
          app: my-app
        ports:
          - protocol: TCP
            port: 80
            targetPort: 80
        type: LoadBalancer
    #-------------------------------------------

  tasks:
    - name: kubeconfig
      shell: |
        aws eks update-kubeconfig --region {{ region }} --name {{ cluster_name }}

    - name: Create deployment file from content
      copy:
        dest: /tmp/deployment.yaml
        content: "{{ deployment_content }}"

    - name: Create service file from content
      copy:
        dest: /tmp/service.yaml
        content: "{{ service_content }}"

    - name: Apply yaml files
      shell: |
        kubectl apply -f /tmp/deployment.yaml
        kubectl apply -f /tmp/service.yaml

    - name: Create SNS Topic
      ansible.builtin.shell: |
        aws sns create-topic --name {{ sns_topic_name }} --region {{ region }} --query 'TopicArn' --output text
      register: sns_arn

    - name: Subscribe Email to SNS Topic
      ansible.builtin.shell: |
        aws sns subscribe \
          --topic-arn {{ sns_arn.stdout }} \
          --protocol email \
          --notification-endpoint {{ user_email }} \
          --region {{ region }}

    - name: Create EventBridge Rule for EC2 Running State
      ansible.builtin.shell: |
        aws events put-rule \
          --name "Notify-EC2-Node-Running" \
          --event-pattern '{"source": ["aws.ec2"], "detail-type": ["EC2 Instance State-change Notification"], "detail": {"state": ["running"]}}' \
          --description "Triggered when an EKS Node (EC2) reaches running state" \
          --region {{ region }}

    - name: Add SNS Topic as Target for EventBridge Rule
      ansible.builtin.shell: |
        aws events put-targets \
          --rule "Notify-EC2-Node-Running" \
          --targets "Id"="1","Arn"="{{ sns_arn.stdout }}" \
          --region {{ region }}

    - name: Add Permission for EventBridge to publish to SNS (FIXED)
      shell: |
        aws sns set-topic-attributes \
          --topic-arn {{ sns_arn.stdout }} \
          --attribute-name Policy \
          --attribute-value '{"Version":"2012-10-17","Statement":[{"Sid":"TrustEventBridge","Effect":"Allow","Principal":{"Service":"events.amazonaws.com"},"Action":"sns:Publish","Resource":"{{ sns_arn.stdout }}"}]}' \
          --region {{ region }}
