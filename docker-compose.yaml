version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - cargo-service
      - telemetry-service
    networks:
      - space-network

  cargo-service:
    build:
      context: ./cargo-service
    ports:
      - "8000:8000"
    environment:
      - TELEMETRY_SERVICE_URL=http://telemetry-service:8000
    depends_on:
      - telemetry-service
    networks:
      - space-network

  telemetry-service:
    build:
      context: ./telemetry-service
    ports:
      - "8002:8000"
    networks:
      - space-network

networks:
  space-network:
    driver: bridge
