services:
  frontend:
    build:
      context: ../../services/frontend
    ports:
      - "8080:8080"
    depends_on:
      - cargo-service
      - telemetry-service
      - routing-service
    networks:
      - space-network
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

  cargo-service:
    build:
      context: ../../services/cargo-service
    ports:
      - "8000:8000"
    environment:
      TELEMETRY_SERVICE_URL: http://telemetry-service:8000
      ROUTING_SERVICE_URL: http://routing-service:8000
    depends_on:
      - telemetry-service
      - routing-service
    networks:
      - space-network
    restart: unless-stopped

  telemetry-service:
    build:
      context: ../../services/telemetry-service
    ports:
      - "8002:8000"
    networks:
      - space-network
    restart: unless-stopped

  routing-service:
    build:
      context: ../../services/routing-service
    ports:
      - "8003:8000"
    networks:
      - space-network
    restart: unless-stopped

networks:
  space-network:
    driver: bridge
