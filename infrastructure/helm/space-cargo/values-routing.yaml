nameOverride: ""
fullnameOverride: ""
namespace:
  create: false
  name: space-cargo

global:
  imageRegistry: docker.io/mahmoudmetwall2y
  imagePullPolicy: IfNotPresent
services:
  routing-service:
      image: depi-routing-service
      tag: "4d8ba5048be11c1069118915b4914923b67f2d08"
      replicas: 2
      port: 8000
      healthPath: /health
      serviceAccount: routing-service
      runAsUser: 10001
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 300m
          memory: 128Mi
      pdb:
        enabled: true
        minAvailable: 1
networkPolicy:
  enabled: false

istio:
  enabled: false