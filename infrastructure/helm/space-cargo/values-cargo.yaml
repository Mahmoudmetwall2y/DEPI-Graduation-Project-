nameOverride: ""
fullnameOverride: ""
namespace:
  create: false
  name: space-cargo

global:
  imageRegistry: docker.io/mahmoudmetwall2y
  imagePullPolicy: IfNotPresent
services:
  cargo-service:
      image: depi-cargo-service
      tag: "8173e1b3e4f2a82af9286301931e6a2b0004f2ad"
      replicas: 1
      port: 8000
      healthPath: /health
      serviceAccount: cargo-service
      runAsUser: 10001
      env:
        TELEMETRY_SERVICE_URL: http://telemetry-service:8000
        ROUTING_SERVICE_URL: http://routing-service:8000
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      pdb:
        enabled: false
networkPolicy:
  enabled: false

istio:
  enabled: false