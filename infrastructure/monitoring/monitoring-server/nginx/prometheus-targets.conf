upstream eks_prometheus_targets {
    server 10.0.2.131:30900 max_fails=2 fail_timeout=10s;
    server 10.0.2.61:30900 max_fails=2 fail_timeout=10s;
    server 10.0.3.207:30900 max_fails=2 fail_timeout=10s;
}

server {
    listen 9090;
    server_name _;

    location / {
        proxy_pass http://eks_prometheus_targets;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
