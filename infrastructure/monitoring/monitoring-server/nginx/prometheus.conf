server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/prometheus.crt;
    ssl_certificate_key /etc/nginx/ssl/prometheus.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    auth_basic "Space Cargo Prometheus";
    auth_basic_user_file /etc/nginx/.htpasswd-prometheus;

    location / {
        proxy_pass http://10.0.1.56:9091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
