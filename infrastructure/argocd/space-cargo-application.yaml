# Argo CD continuously renders the Helm chart from Git and applies it to EKS.
# Platform components (EKS, AWS Load Balancer Controller, and Istio) remain
# provisioned by Ansible; this Application owns only the Space Cargo workload.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: space-cargo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Mahmoudmetwall2y/DEPI-Graduation-Project-
    targetRevision: main
    path: infrastructure/helm/space-cargo
    helm:
      releaseName: space-cargo
  destination:
    server: https://kubernetes.default.svc
    namespace: space-cargo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
